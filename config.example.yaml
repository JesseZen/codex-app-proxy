settings:
    state_dir: ~/.ainn
    log_dir: ~/.ainn/logs
    launch:
        default_mode: hosted-terminal
    terminal:
        host: tmux
        opener: default
        tmux:
            socket_name: ainn
            host_session: ainn-host
plugins:
    api_translate:
        kind: request_middleware
        source: builtin
    image_filter:
        kind: request_middleware
        source: builtin
    config_patch:
        kind: lifecycle_hook
        source: builtin
workers:
    codex-app:
        port: 6767
        upstream: joycode
        log_level: simple
        request_modules:
            api_translate:
                enabled: true
            image_filter:
                enabled: true
        hooks:
            config_patch:
                enabled: true
                config_path: ~/.codex/config.toml
upstreams:
    joycode:
        base_url: https://api.joycode.dev/v1
        api_key: sk-...
        api_format: chat_completions
